name: Deploy Mero Luck

on:
  push:
    branches: [main]

jobs:
  # ─── Job 1: Build & Deploy Frontend to S3 ─────────────────────────────────
  deploy-frontend:
    name: Build & Deploy Frontend → S3 + CloudFront
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build static export
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.EC2_API_URL }}/api
          NEXT_PUBLIC_SOCKET_URL: ${{ secrets.EC2_API_URL }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Sync frontend to S3
        run: aws s3 sync frontend/out s3://${{ secrets.S3_BUCKET_NAME }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_ID }} \
            --paths "/*"

  # ─── Job 2: Deploy Backend to EC2 ─────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → EC2
    runs-on: ubuntu-latest
    needs: deploy-frontend
    steps:
      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ec2-user/app

            echo "→ Pulling latest code..."
            git pull origin main

            echo "→ Installing backend dependencies..."
            cd backend
            npm ci --omit=dev

            echo "→ Building TypeScript..."
            npm run build:prod

            echo "→ Restarting PM2..."
            pm2 restart meroluck-backend || pm2 start ecosystem.config.js

            echo "✅ Deployment complete!"
